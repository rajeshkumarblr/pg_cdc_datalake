name: CI Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ecommerce
          POSTGRES_USER: cdc
          POSTGRES_PASSWORD: cdc_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cdc -d ecommerce"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Configure PostgreSQL Logical Replication
      run: |
        docker exec ${{ job.services.postgres.id }} sh -c "echo 'wal_level = logical' >> /var/lib/postgresql/data/postgresql.conf"
        docker exec ${{ job.services.postgres.id }} sh -c "echo 'max_replication_slots = 10' >> /var/lib/postgresql/data/postgresql.conf"
        docker exec ${{ job.services.postgres.id }} sh -c "pg_ctl reload"
        # Wait for reload
        sleep 2

    - name: Install C++ dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libpq-dev libarrow-dev libparquet-dev

    - name: Compile Daemon
      run: |
        rm -rf build/
        cmake -B build -S .
        cmake --build build

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest psycopg2-binary pyarrow pandas deltalake pyspark

    - name: Setup Database Schema
      run: |
        python3 -c "import tests.simulate_ecommerce; tests.simulate_ecommerce.setup_schema()"

    - name: Run Pytest suite
      run: |
        pytest tests/

    - name: Run E2E Integration test
      run: |
        bash tests/run_test.sh
