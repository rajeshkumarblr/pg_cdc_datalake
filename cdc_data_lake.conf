# cdc_data_lake configuration file
# Lines starting with '#' are comments.

# PostgreSQL connection parameters
pg_host = localhost
pg_port = 9712
pg_database = ecommerce
pg_user = documentdb

# Replication settings
slot_name = delta_snapshot_slot
publication_name = cdc_pub

# Table filters (comma-separated). Empty = all tables in publication.
tables = products, orders, order_items

# Output settings
output_dir = /home/documentdb/myext/cdc_data_lake_cpp/data
file_size_mb = 1
flush_interval_sec = 60

# Ring buffer capacity (number of CDCRow slots)
ring_buffer_capacity = 65536

# Checkpoint file (default: <output_dir>/checkpoint.json)
# checkpoint_file = /data/cdc_lake/checkpoint.json

# Logger configuration
log_file = /home/documentdb/myext/cdc_data_lake_cpp/data/cdc_flow.log
log_to_console = true
row_flush_threshold = 1000
